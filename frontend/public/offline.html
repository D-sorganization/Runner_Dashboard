<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1117">
  <title>Offline — Fleet Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --fg: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --card: #161b22;
    }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .offline-card {
      background: var(--card);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 32px;
      max-width: 360px;
      margin: 16px;
    }
    .offline-card h1 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }
    .offline-card p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .icon {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="offline-card" role="alert" aria-live="polite">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="1" y1="1" x2="23" y2="23"></line>
      <path d="M16.72 11.06A10 10 0 1 1 19.87 6.34"></path>
      <path d="M2 12a10 10 0 0 1 16.72-3.94"></path>
    </svg>
    <h1>You're offline</h1>
    <p>The Fleet Dashboard can't connect right now. Some features may be unavailable until your connection returns.</p>
    <button class="btn" onclick="window.location.reload()" aria-label="Retry loading the dashboard">Retry</button>
  </main>
</body>
</html>
