name: Agent Fleet Dashboard

# Regenerates docs/fleet-in-flight.md every 15 minutes. Only commits if
# the file changed.
#
# Fail-open: if generation fails, a placeholder is written and the
# workflow completes successfully. Next run retries.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: agent-fleet-dashboard
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check Jules app credentials
        id: app-creds
        env:
          JULES_APP_ID: ${{ secrets.JULES_APP_ID }}
          JULES_APP_PRIVATE_KEY: ${{ secrets.JULES_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$JULES_APP_ID" ] && [ -n "$JULES_APP_PRIVATE_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::JULES_APP_ID/JULES_APP_PRIVATE_KEY are not configured; skipping dashboard refresh."
          fi

      - name: Generate Jules app token
        id: app-token
        if: steps.app-creds.outputs.configured == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.JULES_APP_ID }}
          private-key: ${{ secrets.JULES_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        if: steps.app-creds.outputs.configured == 'true'
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-python@v5
        if: steps.app-creds.outputs.configured == 'true'
        with:
          python-version: "3.11"

      - name: Generate dashboard
        if: steps.app-creds.outputs.configured == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python -m scripts.generate_fleet_dashboard \
            --output docs/fleet-in-flight.md \
            || echo "::warning::dashboard generation failed; continuing"

      - name: Commit if changed
        if: steps.app-creds.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs/fleet-in-flight.md)" ]; then
            git add docs/fleet-in-flight.md
            git commit -m "chore(dashboard): refresh fleet-in-flight.md"
            git push origin HEAD:main || \
              echo "::warning::could not push dashboard update; next run retries"
          else
            echo "No change to dashboard; skipping commit."
          fi

      - name: Summary
        if: always()
        env:
          GENERATED_AT: $(date -Iseconds)
          APP_CREDS_CONFIGURED: ${{ steps.app-creds.outputs.configured || 'false' }}
        run: |
          {
            echo "## Agent Fleet Dashboard"
            echo ""
            echo "- **Generated:** $GENERATED_AT"
            echo "- **App credentials configured:** $APP_CREDS_CONFIGURED"
          } >> "$GITHUB_STEP_SUMMARY"
